<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Impostor 412 - Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/overlay/style.css">
</head>
<body>
  <!-- Logo 412 esquina superior izquierda -->
  <div class="overlay-logo">
    <div class="logo-main">4<span class="g">1</span>2</div>
    <div class="logo-sub">IMPOSTOR</div>
  </div>

  <!-- Info de ronda / categoría -->
  <div class="overlay-info" id="overlay-info">
    <div class="info-category" id="info-category">Esperando...</div>
    <div class="info-round" id="info-round">RONDA -</div>
  </div>

  <!-- Timer central -->
  <div class="overlay-timer hidden" id="overlay-timer">
    <div class="timer-label" id="timer-label">DEBATE</div>
    <div class="timer-value" id="timer-value">90</div>
  </div>

  <!-- Panel de jugadores (lateral derecho) -->
  <div class="overlay-players" id="overlay-players"></div>

  <!-- Alerta dramática central -->
  <div class="overlay-alert hidden" id="overlay-alert">
    <div class="alert-content" id="alert-content"></div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Balón animado -->
  <div class="ball-anim hidden" id="ball-anim">⚽</div>

  <!-- Líneas de cancha decorativas -->
  <div class="field-lines">
    <div class="field-circle"></div>
    <div class="field-center-line"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/overlay/app.js"></script>
</body>
</html>
