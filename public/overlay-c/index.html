<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Impostor 412 - Overlay C (Minimal)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/overlay-c/style.css">
</head>
<body>

  <!-- Logo sutil esquina superior izquierda -->
  <div class="mn-logo">4<span class="g">1</span>2</div>

  <!-- Categoría y ronda flotante -->
  <div class="mn-info" id="mn-info">
    <span class="mn-cat" id="info-category">ESPERANDO...</span>
    <span class="mn-sep">·</span>
    <span class="mn-round" id="info-round">LOBBY</span>
  </div>

  <!-- Timer flotante -->
  <div class="mn-timer hidden" id="overlay-timer">
    <span class="mn-timer-label" id="timer-label">DEBATE</span>
    <span class="mn-timer-value" id="timer-value">90</span>
  </div>

  <!-- Jugadores: solo nombres flotantes en esquina inferior derecha -->
  <div class="mn-players" id="overlay-players"></div>

  <!-- Alerta dramática central -->
  <div class="overlay-alert hidden" id="overlay-alert">
    <div class="alert-content" id="alert-content"></div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Balón animado -->
  <div class="ball-anim hidden" id="ball-anim">⚽</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/overlay-c/app.js"></script>
</body>
</html>
